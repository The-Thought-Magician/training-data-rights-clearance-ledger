services:
  - type: web
    name: REPLACE_ME-api
    runtime: node
    buildCommand: cd backend && pnpm install
    startCommand: cd backend && node --import tsx/esm src/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
